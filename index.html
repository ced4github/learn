<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LearnFast — AI Learning Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #09090E;
  --surface: #111118;
  --surface2: #18181F;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0F0F8;
  --text2: #8888A0;
  --text3: #444458;
  --accent: #6C63FF;
  --accent2: #FF6584;
  --accent3: #43D9AD;
  --warn: #FFB347;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;display:flex;flex-direction:column}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.1em;margin-top:2px}
.nav{padding:12px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(108,99,255,.12);color:var(--accent);border-color:rgba(108,99,255,.2)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-section{font-size:9px;letter-spacing:.14em;color:var(--text3);padding:10px 10px 4px;text-transform:uppercase;font-family:var(--font-mono)}
.topic-pill{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.topic-pill:hover{background:var(--surface2);color:var(--text)}
.topic-pill.active{color:var(--text)}
.topic-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.xp-bar-wrap{margin-top:8px}
.xp-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:5px}
.xp-bar{height:4px;background:var(--surface2);border-radius:2px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s ease}

/* ── TOPBAR ── */
.topbar-title{font-family:var(--font-display);font-weight:700;font-size:15px;flex:1}
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-body);font-weight:500;border:none;transition:all .15s;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7B73FF;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:.04em;font-family:var(--font-mono)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── HOME ── */
.hero{background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(255,101,132,.06));border:1px solid rgba(108,99,255,.2);border-radius:16px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(108,99,255,.15),transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:10px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;font-family:var(--font-mono);margin-bottom:8px}
.hero-title{font-family:var(--font-display);font-size:26px;font-weight:800;line-height:1.2;margin-bottom:8px}
.hero-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:var(--text2);font-size:13px;line-height:1.6;max-width:480px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-num{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.stat-delta{font-size:10px;color:var(--accent3);margin-top:4px;font-family:var(--font-mono)}

/* ── TOPIC CARD ── */
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.topic-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:12px}
.topic-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.topic-card:hover::after{opacity:1}
.topic-card-icon{font-size:26px;margin-bottom:10px}
.topic-card-name{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:4px}
.topic-card-desc{font-size:11px;color:var(--text2);line-height:1.5}
.topic-card-belt{margin-top:10px;display:flex;align-items:center;gap:6px}
.belt-pip{width:10px;height:10px;border-radius:50%;border:1px solid var(--border2)}
.belt-label{font-size:10px;color:var(--text3);font-family:var(--font-mono)}

/* ── LESSON VIEW ── */
.lesson-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px}
.lesson-icon-big{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.lesson-meta{font-size:11px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lesson-meta span{display:flex;align-items:center;gap:4px}
.tabs{display:flex;gap:2px;padding:3px;background:var(--surface2);border-radius:8px;width:fit-content;margin-bottom:20px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:var(--font-mono);letter-spacing:.04em}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── AUDIO PLAYER ── */
.player{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.player-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.player-thumb{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.player-title{font-family:var(--font-display);font-size:14px;font-weight:700;line-height:1.3}
.player-sub{font-size:11px;color:var(--text2);margin-top:2px}
.player-controls{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;width:100%}
.play-btn{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;line-height:1;transition:all .15s;flex-shrink:0}
.play-btn:hover{background:#7B73FF}
.progress-wrap{flex:1;min-width:0;margin:0 4px}
.progress-bar{width:100%;height:5px;background:var(--surface);border-radius:3px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .15s;min-width:0}
.time-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--font-mono)}
.speed-btn{padding:4px 7px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:10px;cursor:pointer;font-family:var(--font-mono);white-space:nowrap;flex-shrink:0}
.speed-btn.active-speed{background:rgba(108,99,255,.15);border-color:rgba(108,99,255,.3);color:var(--accent)}
.waveform{height:36px;display:flex;align-items:center;gap:2px;margin:10px 0;cursor:pointer;overflow:hidden}
.wv-bar{width:4px;min-width:4px;border-radius:2px;background:var(--surface);transition:background .1s;flex-shrink:0}
.wv-bar.played{background:var(--accent)}
.segments-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.seg-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.seg-row:hover{background:var(--surface2);border-color:var(--border)}
.seg-row.active{background:rgba(108,99,255,.08);border-color:rgba(108,99,255,.2)}
.seg-time{font-size:10px;color:var(--text3);font-family:var(--font-mono);width:42px;text-align:right;flex-shrink:0}
.seg-name{font-size:12px;flex:1}
.seg-icon{font-size:13px;width:20px;text-align:center;flex-shrink:0}

/* ── SCRIPT ── */
.script-segment{margin-bottom:20px}
.script-seg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.script-seg-label{font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.script-seg-meta{font-size:10px;color:var(--text3);margin-left:auto}
.script-text{font-size:13px;line-height:1.85;color:var(--text2)}

/* ── QUIZ ── */
.quiz-q{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:16px;line-height:1.4}
.quiz-opt{padding:12px 16px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;transition:all .15s;margin-bottom:8px;background:var(--surface2)}
.quiz-opt:hover{border-color:var(--border2);background:var(--surface)}
.quiz-opt.correct{background:rgba(67,217,173,.1);border-color:rgba(67,217,173,.4);color:var(--accent3)}
.quiz-opt.wrong{background:rgba(255,101,132,.1);border-color:rgba(255,101,132,.4);color:var(--accent2)}
.quiz-opt.reveal{opacity:.5;cursor:default}
.quiz-feedback{padding:12px;border-radius:8px;font-size:13px;margin-top:12px;line-height:1.6}
.quiz-feedback.ok{background:rgba(67,217,173,.08);border:1px solid rgba(67,217,173,.2);color:var(--accent3)}
.quiz-feedback.fail{background:rgba(255,101,132,.08);border:1px solid rgba(255,101,132,.2);color:var(--accent2)}
.quiz-progress{display:flex;gap:5px;margin-bottom:20px}
.qp-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);transition:all .2s}
.qp-dot.done{background:var(--accent3);border-color:var(--accent3)}
.qp-dot.current{background:var(--accent);border-color:var(--accent)}

/* ── PLAN ── */
.belt-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.belt-header{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.belt-header:hover{background:var(--surface2)}
.belt-color{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.belt-name{font-family:var(--font-display);font-size:13px;font-weight:700;flex:1}
.belt-status{font-size:10px;font-family:var(--font-mono);color:var(--text3)}
.belt-body{padding:14px 16px;border-top:1px solid var(--border);display:none}
.belt-body.open{display:block}
.belt-obj{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6}
.resource-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.resource-item:last-child{border-bottom:none}
.resource-icon{font-size:13px;margin-top:1px;flex-shrink:0}
.resource-text{font-size:12px;color:var(--text2);line-height:1.5}
.resource-tag{font-size:9px;font-family:var(--font-mono);padding:1px 5px;border-radius:3px;margin-left:4px;background:var(--surface2);border:1px solid var(--border)}

/* ── GENERATE ── */
.gen-panel{max-width:600px}
.gen-form{display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.form-input,select.form-input,textarea.form-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border .15s;width:100%}
.form-input:focus,select.form-input:focus,textarea.form-input:focus{border-color:rgba(108,99,255,.5)}
select.form-input option{background:var(--surface2)}
.gen-progress{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;text-align:center;gap:12px}
.gen-spinner{width:44px;height:44px;border-radius:50%;border:2px solid var(--surface2);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-msgs{font-size:12px;color:var(--text2);font-family:var(--font-mono)}

/* ── LOADING ── */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ── UTILS ── */
.empty{text-align:center;padding:48px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-msg{font-size:13px;line-height:1.6}
.divider{height:1px;background:var(--border);margin:16px 0}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--font-mono);border:1px solid var(--border)}
.scrollbar::-webkit-scrollbar{width:4px}
.scrollbar::-webkit-scrollbar-track{background:transparent}
.scrollbar::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
.fade-in{animation:fadeIn .3s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.reading-mode{font-size:14px;line-height:2;color:var(--text);max-width:680px}
.reading-mode p{margin-bottom:16px}
.tts-notice{background:rgba(255,179,71,.06);border:1px solid rgba(255,179,71,.2);border-radius:8px;padding:12px;font-size:12px;color:var(--warn);margin-bottom:12px}
.tts-notice a{color:var(--warn)}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">LearnFast</div>
      <div class="logo-sub">AI LEARNING COACH</div>
    </div>
    <div class="nav scrollbar">
      <div class="nav-item active" onclick="goHome()" id="nav-home">
        <span class="nav-icon">⚡</span> Dashboard
      </div>
      <div class="nav-item" onclick="goGenerate()" id="nav-generate">
        <span class="nav-icon">✦</span> Generate Lesson
      </div>
      <div class="nav-item" onclick="goPlan()" id="nav-plan">
        <span class="nav-icon">🎯</span> Learning Plan
      </div>
      <div class="nav-section">My Topics</div>
      <div id="topic-nav-list"></div>
    </div>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:12px;font-weight:500" id="xp-level-label">White Belt</div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="badge tag" id="xp-badge" style="color:var(--accent);border-color:rgba(108,99,255,.3)">0 XP</div>
          <button id="notion-sync-btn" onclick="showNotionKeyModal()" title="Connect Notion sync" style="background:transparent;border:1px solid var(--border);border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px;color:var(--text3);transition:all .15s">🔗</button>
          <button onclick="showKeyModal()" title="Set API Key" style="background:transparent;border:1px solid var(--border);border-radius:5px;padding:2px 6px;cursor:pointer;font-size:11px;color:var(--text3)" >🔑</button>
        </div>
      </div>
      <div class="xp-bar-wrap">
        <div class="xp-label"><span>Progress</span><span id="xp-pct">0%</span></div>
        <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar" id="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div id="topbar-actions"></div>
    </div>
    <div class="content scrollbar" id="content-area"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const BELTS=[
  {name:"White Belt",color:"#E8E8E8",xp:0,max:200},
  {name:"Yellow Belt",color:"#FFD700",xp:200,max:500},
  {name:"Green Belt",color:"#43D9AD",xp:500,max:1000},
  {name:"Blue Belt",color:"#6C63FF",xp:1000,max:1800},
  {name:"Brown Belt",color:"#C0764A",xp:1800,max:3000},
  {name:"Black Belt",color:"#1A1A1A",xp:3000,max:5000},
];
const TOPICS_DEF=[
  {id:"ai",name:"AI & ML",icon:"🤖",color:"#6C63FF",desc:"Large language models, neural networks, RAG, agents"},
  {id:"defi",name:"DeFi & Crypto",icon:"₿",color:"#FFB347",desc:"DeFi protocols, tokenomics, MEV, on-chain analytics"},
  {id:"devsecops",name:"DevSecOps",icon:"🔐",color:"#43D9AD",desc:"SAST/DAST, CI/CD security, threat modelling"},
  {id:"macro",name:"Macro & Markets",icon:"📊",color:"#FF6584",desc:"Fed policy, rates, equities, risk frameworks"},
  {id:"blockchain",name:"Blockchain Security",icon:"⛓️",color:"#9B6DFF",desc:"Smart contract audits, ZK proofs, protocol security"},
  {id:"wealth",name:"Wealth Tech",icon:"💎",color:"#4DBAFF",desc:"RWA tokenization, wealth management, RegTech"},
];

const SEG_ICONS={intro:"🎙️",main:"📚",example:"💡",deep:"🔬",summary:"🎯",cta:"🚀"};
const SEG_TIMES={intro:0,main:90,example:270,deep:390,summary:570,cta:630};

let state={
  xp:0,lessons:[],currentTopic:null,currentLesson:null,
  view:"home",generating:false,
  audioState:{playing:false,pos:0,speed:1,segIdx:0},
  quizState:null,planOpen:{},
  planData:null,
};

function save(){
  try{localStorage.setItem("lf_state",JSON.stringify({xp:state.xp,lessons:state.lessons,planData:state.planData}));}catch(e){}
}
function load(){
  try{
    const d=localStorage.getItem("lf_state");
    if(d){
      const p=JSON.parse(d);
      state.xp=typeof p.xp==="number"?p.xp:0;
      state.lessons=Array.isArray(p.lessons)?p.lessons:[];
      state.planData=p.planData||null;
      // Sanitise each lesson — ensure required fields exist
      state.lessons=state.lessons.filter(l=>l&&typeof l==="object"&&l.id&&l.title);
    }
  }catch(e){
    console.warn("Failed to load state, resetting:",e);
    localStorage.removeItem("lf_state");
  }
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
try{load();}catch(e){localStorage.removeItem("lf_state");}
try{updateXPBar();}catch(e){console.warn("updateXPBar failed:",e);}
try{renderTopicNav();}catch(e){console.warn("renderTopicNav failed:",e);}
try{renderHome();}catch(e){
  console.error("renderHome failed:",e);
  // Show error in content area so user sees something
  const el=document.getElementById("content-area");
  if(el)el.innerHTML=`<div style="padding:32px;color:#FF6584;font-family:monospace;font-size:13px">

// Push a single lesson to Notion (creates page + sub-page with full script)
async function notionPushLesson(lesson){
  if(!getNotionKey())return;
  const topicMap={ai:"AI & ML",defi:"DeFi & Crypto",devsecops:"DevSecOps",macro:"Macro & Markets",blockchain:"Blockchain Security",wealth:"Wealth Tech"};
  const topicLabel=topicMap[lesson.topicId]||"Custom";
  // Create DB entry
  const props={
    Title:[{text:{content:lesson.title||"Untitled"}}],
    Topic:{select:{name:topicLabel}},
    Level:{select:{name:lesson.level||"Intermediate"}},
    Duration:{rich_text:[{text:{content:lesson.duration||""}}]},
    Format:{rich_text:[{text:{content:lesson.format||""}}]},
    Keywords:{rich_text:[{text:{content:(lesson.keywords||[]).join(", ")}}]},
    XP:{number:50},
    LessonID:{rich_text:[{text:{content:lesson.id||""}}]},
  };
  // Build children blocks — full script
  const children=[
    {object:"block",type:"callout",callout:{rich_text:[{text:{content:lesson.tagline||""}}],icon:{emoji:"🎙️"},color:"purple_background"}},
    {object:"block",type:"divider",divider:{}},
  ];
  (lesson.segments||[]).forEach(s=>{
    children.push({object:"block",type:"heading_2",heading_2:{rich_text:[{text:{content:(s.label||"")+" — "+s.speaker+" ("+s.duration+")"}}]}});
    // Split script into 2000-char chunks (Notion block limit)
    const txt=s.script||"";
    for(let i=0;i<txt.length;i+=1800){
      children.push({object:"block",type:"paragraph",paragraph:{rich_text:[{text:{content:txt.slice(i,i+1800)}}]}});
    }
    children.push({object:"block",type:"divider",divider:{}});
  });
  if(lesson.showNotes){
    children.push({object:"block",type:"heading_3",heading_3:{rich_text:[{text:{content:"Show Notes"}}]}});
    children.push({object:"block",type:"paragraph",paragraph:{rich_text:[{text:{content:lesson.showNotes}}]}});
  }
  try{
    await fetch(`${NOTION.API}/pages`,{method:"POST",headers:notionHeaders(),
      body:JSON.stringify({parent:{database_id:NOTION.LESSONS_DB},properties:props,children:children.slice(0,100)})});
  }catch(e){console.warn("Notion lesson push failed:",e);}
}

// Push learning plan to Notion
async function notionPushPlan(plan){
  if(!getNotionKey()||!plan)return;
  const belt=getBelt();
  const props={
    Title:[{text:{content:plan.title||"My Learning Plan"}}],
    Topic:{rich_text:[{text:{content:plan.belts?.[0]?.belt||""}}]},
    Goal:{rich_text:[{text:{content:plan.summary||""}}]},
    CurrentBelt:{rich_text:[{text:{content:belt.name}}]},
    TotalXP:{number:state.xp},
    UpdatedAt:{rich_text:[{text:{content:new Date().toISOString()}}]},
  };
  const children=[
    {object:"block",type:"callout",callout:{rich_text:[{text:{content:plan.summary||""}}],icon:{emoji:"🎯"},color:"blue_background"}},
    {object:"block",type:"divider",divider:{}},
  ];
  (plan.belts||[]).forEach(b=>{
    children.push({object:"block",type:"heading_2",heading_2:{rich_text:[{text:{content:b.belt+" Belt — "+b.duration}}]}});
    children.push({object:"block",type:"paragraph",paragraph:{rich_text:[{text:{content:b.objective||""}}]}});
    if(b.resources?.length){
      children.push({object:"block",type:"heading_3",heading_3:{rich_text:[{text:{content:"Resources"}}]}});
      b.resources.forEach(r=>{
        children.push({object:"block",type:"bulleted_list_item",bulleted_list_item:{rich_text:[{text:{content:(r.type==="book"?r.title+(r.author?" by "+r.author:""):r.title)+(r.free?" (Free)":"")}}]}});
      });
    }
    if(b.project)children.push({object:"block",type:"quote",quote:{rich_text:[{text:{content:"Project: "+b.project}}]}});
    children.push({object:"block",type:"divider",divider:{}});
  });
  if(plan.tips?.length){
    children.push({object:"block",type:"heading_3",heading_3:{rich_text:[{text:{content:"Pro Tips"}}]}});
    plan.tips.forEach(t=>children.push({object:"block",type:"bulleted_list_item",bulleted_list_item:{rich_text:[{text:{content:t}}]}}));
  }
  try{
    await fetch(`${NOTION.API}/pages`,{method:"POST",headers:notionHeaders(),
      body:JSON.stringify({parent:{database_id:NOTION.PLANS_DB},properties:props,children:children.slice(0,100)})});
  }catch(e){console.warn("Notion plan push failed:",e);}
}

function getBelt(){

  if(!topicLabel.trim()){alert("Please enter a topic.");return;}

  document.getElementById("gen-form").style.display="none";
  const prog=document.getElementById("gen-progress");
  prog.style.display="block";

  const msgs=["Researching the topic...","Structuring the narrative...","Writing the segments...","Crafting the quiz...","Polishing the script...","Almost ready..."];
  let mi=0;
  const genStart=Date.now();
  prog.innerHTML=`<div class="gen-progress">
    <div class="gen-spinner"></div>
    <div class="gen-msgs" id="gen-msg-txt">${msgs[0]}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px" id="gen-elapsed">0s elapsed</div>

  </div>`;
  const iv=setInterval(()=>{
    mi++;
    const el=document.getElementById("gen-msg-txt");

    const es=document.getElementById("gen-elapsed");

  },2500);

  const TOPIC_PERSONAS={
    ai:`You are a former Google Brain researcher and AI engineer with 15 years building production ML systems. You've shipped LLMs, RAG pipelines, and agentic systems at scale. You explain AI with precise technical accuracy, real architectural trade-offs, and hard-won practical insight — not surface-level definitions.`,

    macro:`You are a macro strategist who spent 15 years at a global macro hedge fund, trading FX, rates, and equities across economic cycles. You think in terms of monetary transmission mechanisms, cross-asset correlations, and positioning — not just news headlines.`,

    wealth:`You are a Managing Director-level wealth technology advisor at a global private bank, with deep expertise in RWA tokenization, regulatory frameworks (MAS, SEC, FCA), and the architecture of wealth management platforms used by UHNW clients.`,
    custom:`You are a world-class domain expert, practitioner, and educator in the requested field. You have 20+ years of hands-on experience. You teach like the best professor at MIT combined with a veteran practitioner from the top firm in the industry.`,
  };

  const persona=TOPIC_PERSONAS[topicId]||TOPIC_PERSONAS.custom;

  const systemPrompt=`${persona}

You write educational podcast scripts that sound like the best episode of a professional podcast — Lex Fridman meets Masters in Business meets a world-class university lecture. Your content is:
- EXPERT-LEVEL: Use precise terminology, real mechanisms, actual numbers and data points where relevant

Output ONLY valid JSON. No markdown fences. No backticks. No preamble. No explanation. No text before or after the JSON. Start your response with { and end with }.`;

  const userPrompt=`Generate a ${dur} expert-level educational podcast episode.

Topic: ${topicLabel}${subtopic?" — Specific focus: "+subtopic:""}
Audience level: ${level}
Format: ${format}
${format==="Host + Guest"?"The guest is a practitioner with deep firsthand experience. The host challenges assumptions and asks hard follow-up questions.":""}

Return this exact JSON structure:
{"title":"Specific compelling title (not generic)","tagline":"One precise hook sentence","topic":"${topicLabel}","level":"${level}","duration":"${dur}","format":"${format}","keywords":["specific-term-1","specific-term-2","specific-term-3","specific-term-4","specific-term-5"],"showNotes":"2 paragraphs: what listeners will learn + 3 specific resources with URLs","segments":[{"type":"intro","label":"Cold Open","speaker":"Host","duration":"~1 min","script":"MINIMUM 250 WORDS. Open with a provocative statement, surprising fact, or counter-intuitive insight that immediately signals expert-level content. No generic introductions. Reference a real recent event, paper, or development."},{"type":"main","label":"Core Mechanism","speaker":"Host","duration":"~3 min","script":"MINIMUM 400 WORDS. Explain the core concept at an expert level. Use the correct technical terminology. Explain HOW it works mechanically, not just WHAT it is. Include real numbers, real systems, real trade-offs."},{"type":"example","label":"Real-World Case Study","speaker":"Host","duration":"~2 min","script":"MINIMUM 300 WORDS. A specific, named real-world case — name the company, protocol, event, date, and outcome. Walk through what actually happened and what it reveals about the underlying mechanisms."},{"type":"deep","label":"Expert Deep Dive","speaker":"${hg?"Guest — a domain practitioner":"Host"}","duration":"~3 min","script":"MINIMUM 400 WORDS. Go deeper than any introductory resource. Address what most people get wrong, the failure modes, the edge cases, the nuances that only practitioners know. Reference specific papers, tools, or frameworks."},{"type":"summary","label":"Synthesis & Implications","speaker":"Host","duration":"~1 min","script":"MINIMUM 200 WORDS. Do NOT just list what was covered. Synthesize: what does this mean for the listener's domain? What should they change about how they think or act? What is the one mental model to take away?"},{"type":"cta","label":"Next Steps","speaker":"Host","duration":"~30 sec","script":"MINIMUM 100 WORDS. Specific, actionable next steps — name the exact resource, paper, tool, or practice. Not generic advice."}]${quizInstr}}`;

  try{

    renderTopicNav();

  }catch(e){

// ══════════════════════════════════════════
//  AUDIO ENGINE v3 — Windows/Chrome safe
// ══════════════════════════════════════════
const TTS={
  speaking:false, segIdx:0, speed:1,
  voice:null, watchdog:null, totalEstSecs:600,
};

// Windows Chrome: voices only available after voiceschanged fires
function initVoices(cb){
  const load=()=>{
    const all=window.speechSynthesis.getVoices();
    if(!all.length)return false;
    // Preference order for Windows
    const pref=[
      v=>v.name==="Microsoft Aria Online (Natural) - English (United States)",
      v=>v.name==="Microsoft Jenny Online (Natural) - English (United States)",
      v=>v.name.includes("Microsoft")&&v.name.includes("Online")&&v.lang.startsWith("en"),
      v=>v.name.includes("Microsoft")&&v.lang.startsWith("en-US"),
      v=>v.name.includes("Microsoft")&&v.lang.startsWith("en"),
      v=>v.name.includes("Google")&&v.lang.startsWith("en"),
      v=>v.lang==="en-US",
      v=>v.lang.startsWith("en"),
    ];
    for(const t of pref){const v=all.find(t);if(v){TTS.voice=v;break;}}
    if(!TTS.voice)TTS.voice=all[0];
    if(cb)cb();
    return true;
  };
  if(!load()){
    window.speechSynthesis.onvoiceschanged=()=>{pickBestVoice();};
    // Fallback poll — Chrome sometimes doesn't fire the event
    let tries=0;
    const poll=setInterval(()=>{if(load()||tries++>10)clearInterval(poll);},300);
  }
}

function populateVoicePicker(){
  const sel=document.getElementById("voice-picker");if(!sel)return;
  const all=window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en"));
  if(!all.length){setTimeout(populateVoicePicker,500);return;}
  sel.innerHTML=all.map((v,i)=>`<option value="${i}"${TTS.voice&&v.name===TTS.voice.name?" selected":""}>${v.name}</option>`).join("");
  const nd=document.getElementById("voice-name-display");
  if(nd&&TTS.voice)nd.textContent=TTS.voice.name;
}
function changeVoice(idx){
  const all=window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en"));
  if(all[idx])TTS.voice=all[idx];
  const nd=document.getElementById("voice-name-display");
  if(nd&&TTS.voice)nd.textContent=TTS.voice.name;
  if(TTS.speaking){stopTTS();startSegment(TTS.segIdx);}
}

// Speak one full segment as a single utterance (most reliable on Windows)
function startSegment(idx){
  const segs=state.currentLesson?.segments||[];
  if(idx>=segs.length){doneTTS();return;}
  TTS.segIdx=idx;
  highlightSeg(idx);

  const text=cleanForTTS(segs[idx].script);
  const u=new SpeechSynthesisUtterance(text);
  if(TTS.voice)u.voice=TTS.voice;
  u.rate=Math.max(0.5,Math.min(2, TTS.speed));
  u.pitch=1.05;
  u.volume=1.0;
  u.lang=TTS.voice?.lang||"en-US";

  // Progress update via interval (boundary events unreliable on Windows)
  clearInterval(TTS.watchdog);
  const segFrac=idx/segs.length;
  const segLen=1/segs.length;
  const estSegSecs=(text.split(/\s+/).length/2.8)/TTS.speed;
  const started=Date.now();
  TTS.watchdog=setInterval(()=>{
    if(!TTS.speaking){clearInterval(TTS.watchdog);return;}
    // Check Chrome stall bug: speechSynthesis pauses silently after ~15s
    if(window.speechSynthesis.speaking===false&&TTS.speaking){
      clearInterval(TTS.watchdog);
      startSegment(idx+1); // auto-advance if stalled
      return;
    }
    const elapsed=(Date.now()-started)/1000;
    const within=Math.min(elapsed/estSegSecs,0.99);
    setProgress(segFrac+within*segLen);
  },250);

  u.onend=()=>{
    clearInterval(TTS.watchdog);
    if(TTS.speaking)startSegment(idx+1);
  };
  u.onerror=(e)=>{
    clearInterval(TTS.watchdog);
    if(e.error==="interrupted"||e.error==="canceled")return;
    if(TTS.speaking)startSegment(idx+1);
  };
  window.speechSynthesis.cancel(); // clear queue first
  setTimeout(()=>window.speechSynthesis.speak(u), 50); // small delay avoids Chrome race
}

function cleanForTTS(text){
  return text
    .replace(/\[.*?\]/g,"").replace(/\*+/g,"").replace(/#+\s/g,"")
    .replace(/---+/g,". ").replace(/—/g,", ").replace(/\s{2,}/g," ").trim();
}

function doneTTS(){
  TTS.speaking=false;clearInterval(TTS.watchdog);
  updatePlayBtn(false);setProgress(1);
}
function stopTTS(){
  window.speechSynthesis.cancel();
  TTS.speaking=false;clearInterval(TTS.watchdog);
  updatePlayBtn(false);
}
function togglePlay(){
  if(TTS.speaking)stopTTS();
  else{
    TTS.speaking=true;updatePlayBtn(true);
    startSegment(TTS.segIdx);
  }
}
function skipSeg(dir){
  const segs=state.currentLesson?.segments||[];
  const next=Math.max(0,Math.min(segs.length-1,TTS.segIdx+dir));
  const wasPlaying=TTS.speaking;
  stopTTS();TTS.segIdx=next;
  setProgress(next/segs.length);highlightSeg(next);
  if(wasPlaying){TTS.speaking=true;updatePlayBtn(true);startSegment(next);}
}
function jumpToSeg(i){
  const segs=state.currentLesson?.segments||[];
  const wasPlaying=TTS.speaking;
  stopTTS();TTS.segIdx=i;
  setProgress(i/segs.length);highlightSeg(i);
  if(wasPlaying){TTS.speaking=true;updatePlayBtn(true);startSegment(i);}
}
function setSpeed(s,btn){
  TTS.speed=s;
  document.querySelectorAll(".speed-btn").forEach(b=>b.classList.remove("active-speed"));
  if(btn)btn.classList.add("active-speed");
  const wasPlaying=TTS.speaking;
  if(wasPlaying){stopTTS();TTS.speaking=true;updatePlayBtn(true);startSegment(TTS.segIdx);}
}
function seekAudio(e){
  const bar=document.getElementById("prog-bar");if(!bar)return;
  const pct=e.offsetX/bar.offsetWidth;
  const segs=state.currentLesson?.segments||[];
  const newSeg=Math.min(segs.length-1,Math.floor(pct*segs.length));
  jumpToSeg(newSeg);
}

function renderWaveform(){
  const wf=document.getElementById("waveform");if(!wf)return;
  wf.innerHTML="";
  for(let i=0;i<48;i++){
    const b=document.createElement("div");b.className="wv-bar";
    b.style.height=(5+Math.abs(Math.sin(i*0.5)*22)+(Math.random()*8))+"px";
    wf.appendChild(b);
  }
}
function updateWaveform(pct){
  const bars=document.querySelectorAll(".wv-bar");
  const idx=Math.floor(pct*bars.length);
  bars.forEach((b,i)=>b.classList.toggle("played",i<idx));
}
function setProgress(pct){
  pct=Math.max(0,Math.min(1,pct));
  const pf=document.getElementById("prog-fill");if(pf)pf.style.width=(pct*100)+"%";
  updateWaveform(pct);
  const segs=state.currentLesson?.segments||[];
  const estTotal=segs.reduce((a,s)=>a+(s.script.split(/\s+/).length/2.8),0)/TTS.speed;
  const tc=document.getElementById("time-cur");
  if(tc)tc.textContent=fmtTime(Math.round(pct*estTotal));
}
function fmtTime(s){const m=Math.floor(Math.abs(s)/60);return m+":"+(Math.abs(s)%60<10?"0":"")+Math.floor(Math.abs(s)%60);}
function updatePlayBtn(p){const b=document.getElementById("play-btn");if(b)b.textContent=p?"⏸":"▶";}
function highlightSeg(i){document.querySelectorAll(".seg-row").forEach((r,j)=>r.classList.toggle("active",j===i));}
function copyFullScript(){
  const l=state.currentLesson;if(!l)return;
  const txt=(l.segments||[]).map(s=>`[${s.label.toUpperCase()} — ${s.speaker} — ${s.duration}]\n\n${s.script}`).join("\n\n---\n\n");
  navigator.clipboard.writeText(txt).then(()=>alert("Script copied! Paste into ElevenLabs for professional audio."));
}

function initQuiz(){

  if(!l||!l.quiz){document.getElementById("quiz-container").innerHTML=renderNotesTab();return;}
  state.quizState={questions:l.quiz,current:0,score:0,answered:[]};

}
function renderQuizQuestion(){
  const qs=state.quizState;
  if(!qs)return;
  const qc=document.getElementById("quiz-container");if(!qc)return;
  if(qs.current>=qs.questions.length){renderQuizResult();return;}
  const q=qs.questions[qs.current];
  qc.innerHTML=`
    <div class="fade-in">
      <div class="quiz-progress">${qs.questions.map((_,i)=>`<div class="qp-dot ${i<qs.current?"done":i===qs.current?"current":""}"></div>`).join("")}</div>
      <div style="font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-bottom:12px">QUESTION ${qs.current+1} OF ${qs.questions.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div>${q.opts.map((o,i)=>`<div class="quiz-opt" id="quiz-opt-${i}" onclick="answerQuiz(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join("")}</div>
      <div id="quiz-feedback"></div>
    </div>`;
}
function answerQuiz(i){
  const qs=state.quizState;if(!qs)return;
  const q=qs.questions[qs.current];
  const correct=i===q.answer;
  document.querySelectorAll(".quiz-opt").forEach((el,j)=>{
    if(j===q.answer)el.classList.add("correct");
    else if(j===i&&!correct)el.classList.add("wrong");
    else el.classList.add("reveal");
    el.onclick=null;
  });
  const fb=document.getElementById("quiz-feedback");
  fb.innerHTML=`<div class="quiz-feedback ${correct?"ok":"fail"}">${correct?"✓ Correct! ":"✗ Not quite. "}${q.explain}</div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="nextQuizQ()">Next →</button>`;
  if(correct){qs.score++;addXP(20);}
}
function nextQuizQ(){
  const qs=state.quizState;qs.current++;
  if(qs.current>=qs.questions.length)renderQuizResult();else renderQuizQuestion();
}
function renderQuizResult(){
  const qs=state.quizState;
  const pct=Math.round(qs.score/qs.questions.length*100);
  const qc=document.getElementById("quiz-container");if(!qc)return;
  const stars=pct>=80?"⭐⭐⭐":pct>=60?"⭐⭐":"⭐";
  qc.innerHTML=`
    <div class="fade-in card" style="text-align:center;padding:32px">
      <div style="font-size:40px;margin-bottom:12px">${stars}</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:6px">${pct}% Correct</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px">${qs.score} / ${qs.questions.length} questions right · +${qs.score*20} XP earned</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="initQuiz()">Retry quiz</button>
        <button class="btn btn-ghost" onclick="goGenerate()">New episode</button>
      </div>
    </div>`;
  addXP(pct>=80?50:pct>=60?25:10);
}

async function generatePlan(){
  requireKey(()=>_doPlan());
}
async function _doPlan(){
  const topic=document.getElementById("plan-topic").value;
  const level=document.getElementById("plan-level").value;
  const hrs=document.getElementById("plan-hrs").value;
  const goal=document.getElementById("plan-goal").value;
  if(!topic.trim()){alert("Please enter a topic.");return;}
  document.getElementById("plan-form").style.display="none";
  const prog=document.getElementById("plan-progress");
  prog.style.display="block";
  const planStart=Date.now();
  prog.innerHTML=`<div class="gen-progress">
    <div class="gen-spinner"></div>
    <div class="gen-msgs">Building your personalized learning plan...</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px" id="plan-elapsed">0s elapsed</div>
    <button onclick="cancelGeneration()" style="margin-top:16px;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 16px;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--font-mono)">Cancel</button>
  </div>`;
  const planTick=setInterval(()=>{
    const es=document.getElementById("plan-elapsed");
    const secs=Math.round((Date.now()-planStart)/1000);
    if(es)es.textContent=secs+"s elapsed"+(secs>20?" — structuring belts...":secs>40?" — almost done...":"");
  },1000);

  const BELT_COLORS={"White":"#E8E8E8","Yellow":"#FFD700","Green":"#43D9AD","Blue":"#6C63FF","Brown":"#C0764A","Black":"#333333"};
  const prompt=`You are an expert learning coach. Create a 6-belt structured learning plan. Be concise — keep each field short.

Topic: ${topic}
Level: ${level} | Time: ${hrs}/week | Goal: ${goal||"Master the topic"}

Return ONLY a valid JSON object. No markdown. No backticks. No explanation. No text before or after. Start with { and end with }.

Schema (fill ALL 6 belts — White/Yellow/Green/Blue/Brown/Black):
{
  "title": "short plan title",
  "summary": "1-2 sentences",
  "belts": [
    {
      "belt": "White",
      "duration": "1-2 weeks",
      "objective": "1 sentence: what learner can do",
      "resources": [
        {"type": "video", "title": "exact resource name", "free": true},
        {"type": "article", "title": "exact resource name", "free": true},
        {"type": "book", "title": "exact book title", "author": "author", "free": false}
      ],
      "project": "1 sentence hands-on task",
      "checkpoint": "1 sentence: how to know you're ready"
    }
  ],
  "tips": ["tip 1", "tip 2", "tip 3"]
}`;

  const planSystem=`You are a world-class learning designer and domain expert. You create structured, opinionated learning plans that take people from zero to expert faster than any university curriculum. Your plans reference real, specific resources — named books, named courses, named tools — not generic suggestions. You are direct, practical, and hold nothing back.`;

  try{
    const data=await callLLM(planSystem, prompt, 6000);
    clearInterval(planTick);
    if(data.error){throw new Error(data.error.message||"API error");}
    const raw=extractText(data);
    const parsed=safeParseJSON(raw);
    (parsed.belts||[]).forEach(b=>{b.color=BELT_COLORS[b.belt]||"#888";});
    state.planData=parsed;
    addXP(30);save();
    notionPushPlan(parsed).then(()=>{if(getNotionKey())showSyncToast("Plan synced to Notion");}).catch(()=>{});
    renderPlanView();
  }catch(e){
    clearInterval(planTick);
    prog.innerHTML=`<div class="card" style="border-color:rgba(255,101,132,.3);background:rgba(255,101,132,.05)">
      <div style="color:var(--accent2);font-size:13px;margin-bottom:8px">⚠ ${e.message}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Check browser console for details.</div>
      <button class="btn btn-ghost" onclick="state.planData=null;renderPlan()">Try again</button>
    </div>`;
  }
}

function getBeltLessons(beltIdx){
  // Lessons linked to a belt are tagged with planBeltIdx
  return state.lessons.filter(l=>l.planBeltIdx===beltIdx);
}
function getBeltProgress(beltIdx){
  const lessons=getBeltLessons(beltIdx);
  const done=lessons.filter(l=>l.completed).length;
  return {total:lessons.length,done};
}
function markLessonComplete(lessonId){
  const l=state.lessons.find(x=>x.id===lessonId);
  if(l){l.completed=!l.completed;save();renderPlanView();}
}
function generateLessonForBelt(beltIdx){
  const p=state.planData;
  if(!p)return;
  const belt=p.belts[beltIdx];
  // Store pending belt context so generate can pick it up
  state.pendingBeltIdx=beltIdx;
  state.pendingBeltObjective=belt.objective;
  // Navigate to generate with pre-filled context
  goGenerate();
  // Pre-fill after render
  setTimeout(()=>{
    const topicInput=document.getElementById("g-subtopic");
    if(topicInput)topicInput.value=belt.objective;
    // Try to match topic
    const planTitle=(p.title||"").toLowerCase();
    const topicMatch=TOPICS_DEF.find(t=>planTitle.includes(t.name.toLowerCase().split(" ")[0].toLowerCase()));
    if(topicMatch){
      const sel=document.getElementById("g-topic");
      if(sel)sel.value=topicMatch.id;
    }
    // Set level based on belt
    const levelMap={White:"Beginner",Yellow:"Beginner",Green:"Intermediate",Blue:"Intermediate",Brown:"Advanced",Black:"Expert"};
    const lvlSel=document.getElementById("g-level");
    if(lvlSel)lvlSel.value=levelMap[belt.belt]||"Intermediate";
    // Show banner
    const form=document.getElementById("gen-form");
    if(form){
      const banner=document.createElement("div");
      banner.style.cssText="background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:8px";
      banner.innerHTML=`<span style="font-size:14px">🎯</span><span>Generating for <strong>${belt.belt} Belt</strong> — ${belt.objective}</span>`;
      form.insertBefore(banner,form.firstChild);
    }
  },80);
}

function getProvider(){return localStorage.getItem("lf_provider")||"groq";}

// Build system + user messages for each provider
function buildMessages(systemPrompt, userPrompt){
  return [
    {role:"system", content:systemPrompt},
    {role:"user",   content:userPrompt},
  ];
}

let _genAbort=null;
function cancelGeneration(){
  if(_genAbort)_genAbort.abort();
  goGenerate(); // reset to form
}

async function fetchWithTimeout(url, options, ms=45000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  try{
    const res=await fetch(url,{...options,signal:ctrl.signal});
    clearTimeout(timer);
    return res;
  }catch(e){
    clearTimeout(timer);
    if(e.name==="AbortError")throw new Error("Request timed out after "+Math.round(ms/1000)+"s. The model may be overloaded — try again or switch provider (🔑).");
    throw e;
  }
}

async function callLLM(systemPrompt, userPrompt, maxTokens){
  const p=getProvider();
  const key=getApiKey();
  const cfg=PROVIDERS[p];
  const messages=buildMessages(systemPrompt, userPrompt);

  if(p==="openrouter"){
    const tryOR=async(model)=>{
      const res=await fetchWithTimeout("https://openrouter.ai/api/v1/chat/completions",{method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+key,"HTTP-Referer":"https://learnfast.app","X-Title":"LearnFast"},
        body:JSON.stringify({model,messages,max_tokens:maxTokens,temperature:0.7})},50000);
      return await res.json();
    };
    for(const model of [cfg.model, cfg.fallback, cfg.fallback2].filter(Boolean)){
      const data=await tryOR(model);
      if(data.choices&&!data.error){return data;}
      const errMsg=data.error?.message||"";
      if(errMsg.includes("No endpoints found")||errMsg.includes("unavailable")){
        console.warn(`OpenRouter model ${model} unavailable, trying next...`);
        continue;
      }
      throw new Error(errMsg||"OpenRouter error");
    }
    throw new Error("All OpenRouter free models unavailable. Switch to Groq (click 🔑).");
  }
  if(p==="groq"){
    const tryGroq=async(model)=>{
      const res=await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions",{method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
        body:JSON.stringify({model,messages,max_tokens:Math.min(maxTokens,8000),temperature:0.6})},45000);
      return await res.json();
    };
    let data=await tryGroq(cfg.model);
    if(data.error&&cfg.fallback){
      console.warn("Groq primary model issue, trying fallback:",cfg.fallback);
      data=await tryGroq(cfg.fallback);
    }
    return data;
  }
  // anthropic
  const res=await fetchWithTimeout("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:cfg.model,max_tokens:maxTokens,system:systemPrompt,messages:[{role:"user",content:userPrompt}]})},60000);
  return await res.json();
}

function extractText(data){
  let text="";
  if(data.candidates){
    text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
  } else if(data.choices){
    text=data.choices?.[0]?.message?.content||"";
  } else if(data.content){
    text=data.content.map(b=>b.text||"").join("");
  } else {
    const err=data.error?.message||data.error?.error?.message||JSON.stringify(data.error||data);
    throw new Error(err);
  }
  return text;
}

function sanitiseJSON(text){
  // Escape unescaped control characters inside JSON string values
  return text.replace(
    /"((?:[^"\\]|\\.)*)"/g,
    (_,inner)=>'"'+inner
      .replace(/\\/g,"\\\\")  // must come first
      .replace(/\n/g,"\\n")
      .replace(/\r/g,"\\r")
      .replace(/\t/g,"\\t")
      .replace(/[\x00-\x1F\x7F]/g,c=>"\\u"+c.charCodeAt(0).toString(16).padStart(4,"0"))
      +'"'
  );
}
function extractJSONBlock(text){
  // Find outermost { ... } block
  let depth=0,start=-1;
  for(let i=0;i<text.length;i++){
    if(text[i]==="{"){if(depth===0)start=i;depth++;}
    else if(text[i]==="}"){depth--;if(depth===0&&start!==-1)return text.slice(start,i+1);}
  }
  return null;
}
function safeParseJSON(raw){
  // Pre-clean: strip think tags and fences
  let text=raw
    .replace(/<think>[\s\S]*?<\/think>/gi,"")
    .replace(/^```json\s*/i,"").replace(/^```\s*/,"").replace(/```\s*$/,"")
    .trim();

  // Strategy 1 — direct
  try{return JSON.parse(text);}catch(e1){}

  // Strategy 2 — sanitise control chars then parse
  try{return JSON.parse(sanitiseJSON(text));}catch(e2){}

  // Strategy 3 — extract JSON block, then parse
  const block=extractJSONBlock(text);
  if(block){
    try{return JSON.parse(block);}catch(e3){}
    // Strategy 4 — extract + sanitise
    try{return JSON.parse(sanitiseJSON(block));}catch(e4){}
    // Strategy 5 — extract + strip all control chars
    try{return JSON.parse(block.replace(/[\x00-\x09\x0B\x0C\x0E-\x1F\x7F]/g,""));}catch(e5){}
  }

  // Strategy 6 — strip ALL control chars from full text and retry
  try{return JSON.parse(text.replace(/[\x00-\x09\x0B\x0C\x0E-\x1F\x7F]/g,""));}catch(e6){}

  throw new Error("Could not parse AI response. Please try again — the model returned malformed output.");
}

  m.innerHTML=`
    <div style="background:#111118;border:1px solid rgba(108,99,255,.3);border-radius:14px;padding:28px;width:440px;max-width:92vw">
      <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:16px">API Provider & Key</div>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        ${Object.entries(PROVIDERS).map(([id,cfg])=>`
          <button id="prov-btn-${id}" onclick="selectProvider('${id}')"
            style="flex:1;padding:8px 6px;border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.04em;transition:all .15s;
            background:${id===curProvider?"rgba(108,99,255,.15)":"#18181F"};
            border:1px solid ${id===curProvider?"rgba(108,99,255,.5)":"rgba(255,255,255,.08)"};
            color:${id===curProvider?"#6C63FF":"#8888A0"}">
            ${cfg.name}<br><span style="font-size:9px;opacity:.7">${cfg.badge}</span>
          </button>`).join("")}
      </div>
      <div id="key-hint" style="font-size:11px;color:#8888A0;margin-bottom:12px;line-height:1.6">${PROVIDERS[curProvider].hint}</div>
      <input id="key-input" type="password" placeholder="${PROVIDERS[curProvider].placeholder}" autocomplete="off"
        value="${localStorage.getItem("lf_apikey_"+curProvider)||""}"
        style="width:100%;background:#18181F;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;color:#F0F0F8;font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:8px"/>
      <div id="key-error" style="font-size:11px;color:#FF6584;margin-bottom:10px;display:none"></div>
      <div style="display:flex;gap:8px">
        <button onclick="submitKey()" style="flex:1;padding:10px;background:#6C63FF;border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer">Save & Continue</button>
        ${getApiKey()?`<button onclick="document.getElementById('key-modal').remove()" style="padding:10px 16px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#8888A0;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">Cancel</button>`:""}
      </div>
    </div>`;
  document.body.appendChild(m);
  document.getElementById("key-input").addEventListener("keydown",e=>{if(e.key==="Enter")submitKey();});
  window._keyModalCallback=onSuccess||null;
}
function selectProvider(id){
  saveProvider(id);
  const cfg=PROVIDERS[id];
  document.querySelectorAll("[id^='prov-btn-']").forEach(b=>{
    const bid=b.id.replace("prov-btn-","");
    b.style.background=bid===id?"rgba(108,99,255,.15)":"#18181F";
    b.style.borderColor=bid===id?"rgba(108,99,255,.5)":"rgba(255,255,255,.08)";
    b.style.color=bid===id?"#6C63FF":"#8888A0";
  });
  document.getElementById("key-hint").innerHTML=cfg.hint;
  const inp=document.getElementById("key-input");
  inp.placeholder=cfg.placeholder;
  inp.value=localStorage.getItem("lf_apikey_"+id)||"";
  document.getElementById("key-error").style.display="none";
}
function submitKey(){
  const val=document.getElementById("key-input").value.trim();
  const p=getProvider();
  const err=document.getElementById("key-error");
  if(!val){err.textContent="Please enter your API key";err.style.display="block";return;}
  saveApiKey(p,val);
  document.getElementById("key-modal").remove();
  if(window._keyModalCallback)window._keyModalCallback();
}
function requireKey(cb){
  if(getApiKey())cb();
  else showKeyModal(cb);
}

//  DELETE & NOTION ARCHIVE
// ══════════════════════════════════════════

// Find a Notion page in a DB by a text property value, return its page id
async function notionFindPage(dbId, propName, propValue){
  try{
    const res=await fetch(`${NOTION.API}/databases/${dbId}/query`,{
      method:"POST",headers:notionHeaders(),
      body:JSON.stringify({filter:{property:propName,rich_text:{equals:propValue}},page_size:1}),
    });
    const data=await res.json();
    return data.results?.[0]?.id||null;
  }catch(e){return null;}
}

// Archive (soft-delete) a Notion page by id
async function notionArchivePage(pageId){
  if(!pageId)return;
  try{
    await fetch(`${NOTION.API}/pages/${pageId}`,{
      method:"PATCH",headers:notionHeaders(),
      body:JSON.stringify({archived:true}),
    });
  }catch(e){console.warn("Notion archive failed:",e);}
}

async function deleteLesson(id){
  if(!confirm("Delete this lesson? It will also be removed from Notion."))return;
  // Remove from local state
  state.lessons=state.lessons.filter(l=>l.id!==id);
  save();
  // Remove row from DOM immediately
  const row=document.getElementById("lesson-row-"+id);
  if(row){row.style.opacity="0";row.style.transition="opacity .2s";setTimeout(()=>row.remove(),200);}
  // Update stat count
  const statEl=document.querySelector(".stat-num");if(statEl)statEl.textContent=state.lessons.length;
  // Archive in Notion async
  if(getNotionKey()){
    const pageId=await notionFindPage(NOTION.LESSONS_DB,"LessonID",id);
    if(pageId){
      await notionArchivePage(pageId);
      showSyncToast("Lesson deleted from Notion");
    }else{
      showSyncToast("Removed locally (not found in Notion)",false);
    }
  }
}

async function deletePlan(){
  if(!confirm("Delete this learning plan? It will also be removed from Notion."))return;
  const planTitle=state.planData?.title||"";
  state.planData=null;
  save();
  // Archive in Notion async
  if(getNotionKey()&&planTitle){
    // Plans are stored with title as the main identifier
    try{
      const res=await fetch(`${NOTION.API}/databases/${NOTION.PLANS_DB}/query`,{
        method:"POST",headers:notionHeaders(),
        body:JSON.stringify({filter:{property:"title",title:{equals:planTitle}},page_size:1}),
      });
      const data=await res.json();
      const pageId=data.results?.[0]?.id||null;
      if(pageId){
        await notionArchivePage(pageId);
        showSyncToast("Plan deleted from Notion");
      }
    }catch(e){}
  }
  renderPlan();
}
</script>
